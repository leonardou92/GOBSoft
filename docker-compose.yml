services:
  db:
    image: mysql:8.0
    container_name: ${PROJECT_NAME:-gobsoft}-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - gobsoft_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-gobsoft}-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-development}
      PORT: 3000
      CORS_ORIGIN: ${BACKEND_CORS_ORIGIN}
      JWT_SECRET: ${BACKEND_JWT_SECRET}
      JWT_EXPIRES_IN: ${BACKEND_JWT_EXPIRES_IN}
      TWO_FACTOR_ENCRYPTION_KEY: ${BACKEND_TWO_FACTOR_ENCRYPTION_KEY}
      DATABASE_URL: ${DATABASE_URL}
      STATEMENT_SYNC_CRON: ${BACKEND_STATEMENT_SYNC_CRON}
      INITIAL_SYNC_START_DATE: ${BACKEND_INITIAL_SYNC_START_DATE}
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_DASHBOARD_HEARTBEAT_MS: ${VITE_DASHBOARD_HEARTBEAT_MS}
        VITE_APP_VERSION: ${VITE_APP_VERSION}
    container_name: ${PROJECT_NAME:-gobsoft}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  gobsoft_mysql_data:
